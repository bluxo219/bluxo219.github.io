<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Social</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:12px;
background:#111a2e;
position:sticky;
top:0;
}

.container{
padding:10px;
max-width:600px;
margin:auto;
}

.card{
background:#111a2e;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

input, textarea{
width:95%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:8px 10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:5px;
}

.post-header{
font-size:13px;
opacity:0.7;
}

.actions{
display:flex;
gap:10px;
margin-top:8px;
}

.small{
font-size:12px;
opacity:0.8;
cursor:pointer;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
<div class="card">
<h2>🌐 Mini Social Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<div>🔥 Mini Social</div>
<div onclick="logout()" style="cursor:pointer">Sair</div>
</div>

<div class="container">

<!-- POST CREATE -->
<div class="card">
<h3>Criar post</h3>
<textarea id="postText" placeholder="O que você está pensando?"></textarea>
<button onclick="createPost()">Publicar</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "ID",
  appId: "ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* LOGIN */
window.register = async () => {
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;
await createUserWithEmailAndPassword(auth,email,pass);
alert("Conta criada!");
};

window.login = async () => {
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;
let res = await signInWithEmailAndPassword(auth,email,pass);
user = res.user;
start();
};

window.logout = async () => {
await signOut(auth);
location.reload();
};

function start(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
listenPosts();
}

/* CRIAR POST */
window.createPost = async () => {
let text = document.getElementById("postText").value;

await addDoc(collection(db,"posts"),{
text:text,
user:user.email,
likes:0,
comments:[],
time:Date.now()
});

document.getElementById("postText").value="";
};

/* FEED EM TEMPO REAL */
function listenPosts(){
onSnapshot(collection(db,"posts"),snap=>{
let feed = document.getElementById("feed");
feed.innerHTML="";

snap.forEach(docSnap=>{
let p = docSnap.data();
let id = docSnap.id;

feed.innerHTML += `
<div class="card">
<div class="post-header">${p.user}</div>
<p>${p.text}</p>

<div class="actions">
<button onclick="likePost('${id}',${p.likes})">❤️ ${p.likes}</button>
</div>

<input id="c-${id}" placeholder="comentar">
<button onclick="comment('${id}')">Comentar</button>

<div class="small">
${(p.comments||[]).map(c=>`• ${c}`).join("<br>")}
</div>
</div>
`;
});
});
}

/* LIKE */
window.likePost = async (id,likes)=>{
const ref = doc(db,"posts",id);
await updateDoc(ref,{
likes: likes + 1
});
};

/* COMENTÁRIO */
window.comment = async (id)=>{
let input = document.getElementById("c-"+id);
if(!input.value) return;

const ref = doc(db,"posts",id);
await updateDoc(ref,{
comments: arrayUnion(user.email + ": " + input.value)
});

input.value="";
};

</script>

</body>
</html>
